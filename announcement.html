<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcement</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; padding: 2em; background: #f9f9f9; }
    .announcement { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #ccc; padding: 2em; text-align: center; }
    .announcement h2 { color: #5C2D91; }
  </style>
</head>
<body>
  <div class="announcement">
    <h2>Office Assistant is Now Available!</h2>
    <p>Book your room today!</p>
  </div>
</body>
</html>
